<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Library System Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1313ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Subtle Indigo Gradient Background Container -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden bg-gradient-to-br from-primary/10 via-background-light to-primary/5 dark:from-primary/20 dark:via-background-dark dark:to-background-dark">
<!-- Header / Logo Area -->
<div class="absolute top-0 w-full px-6 py-8 md:px-10 lg:px-40">
<header class="flex items-center justify-between whitespace-nowrap">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">local_library</span>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">Lumina Library</h2>
</div>
<button class="flex items-center justify-center rounded-xl h-10 px-6 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 text-sm font-semibold transition-all hover:bg-slate-50 dark:hover:bg-slate-800">
<span>Support</span>
</button>
</header>
</div>
<!-- Login Card -->
<main class="w-full max-w-md px-6 py-12">
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-md border border-slate-100 dark:border-slate-800 p-8 md:p-10">
<div class="flex flex-col gap-2 mb-8 text-center">
<h1 class="text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your credentials to access the management dashboard.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
<input class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="name@library.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between ml-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="w-full pl-11 pr-12 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<!-- Error State Example (Hidden by default or shown if needed) -->
<p class="hidden text-xs text-red-500 mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">error</span>
                            Invalid email or password. Please try again.
                        </p>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 py-1">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary/30 cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2" type="submit">
<span>Sign In to Dashboard</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        New librarian? <a class="font-bold text-primary hover:underline" href="#">Contact your administrator</a>
</p>
</div>
</div>
<!-- Trust Footer -->
<div class="mt-8 flex items-center justify-center gap-6 text-slate-400 dark:text-slate-600 grayscale opacity-70">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">verified_user</span>
<span class="text-xs font-medium uppercase tracking-widest leading-none">Secure Access</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">cloud</span>
<span class="text-xs font-medium uppercase tracking-widest leading-none">Cloud Sync</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">groups</span>
<span class="text-xs font-medium uppercase tracking-widest leading-none">RBAC Ready</span>
</div>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="absolute -z-10 top-0 left-0 w-full h-full pointer-events-none">
<div class="absolute top-[10%] left-[5%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[10%] right-[5%] w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
</div>
</div>
</body></html>
